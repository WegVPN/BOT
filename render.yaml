services:
  # Backend API
  - type: web
    name: forum-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: forum-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: forum-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /api/health

  # Frontend (static on Render)
  - type: web
    name: forum-frontend
    env: static
    region: frankfurt
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/.next/static
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: forum-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: forum-db
    databaseName: forum_db
    plan: free
  
  - name: forum-redis
    type: redis
    plan: free
